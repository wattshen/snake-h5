<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇 H5 游戏</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <h1>🐍 贪吃蛇 H5 游戏</h1>
        
        <!-- 配置界面 -->
        <div id="config-screen" class="screen active">
            <div class="config-form">
                <div class="form-group">
                    <label for="speed">蛇行进速度：</label>
                    <select id="speed">
                        <option value="200">慢</option>
                        <option value="100" selected>中</option>
                        <option value="50">快</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="target-score">目标分数：</label>
                    <input type="number" id="target-score" value="10" min="1" max="100">
                </div>
                
                <div class="form-group">
                    <label for="lives">复活次数：</label>
                    <select id="lives">
                        <option value="0">0 次</option>
                        <option value="1" selected>1 次</option>
                        <option value="2">2 次</option>
                        <option value="3">3 次</option>
                        <option value="4">4 次</option>
                        <option value="5">5 次</option>
                    </select>
                </div>
                
                <button id="start-btn" class="btn btn-primary">开始游戏</button>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <div class="game-header">
                <div class="score">分数：<span id="current-score">0</span> / <span id="target-score-display">10</span></div>
                <div class="lives">复活次数：<span id="lives-display">1</span></div>
            </div>
            
            <canvas id="game-canvas" width="400" height="400"></canvas>
            
            <div class="game-controls">
                <button id="pause-btn" class="btn btn-secondary">⏸️ 暂停</button>
                <button id="restart-btn" class="btn btn-secondary">🔄 重新开始</button>
                <button id="back-btn" class="btn btn-secondary">⚙️ 配置</button>
            </div>
            
            <div class="controls-hint">
                <p>方向键：移动 | 空格：暂停/继续</p>
            </div>
        </div>
        
        <!-- 游戏结束界面 -->
        <div id="game-over-screen" class="screen">
            <h2 id="game-over-title">游戏结束</h2>
            <p class="game-over-stats">
                最终分数：<span id="final-score">0</span><br>
                目标分数：<span id="final-target">10</span>
            </p>
            <button id="play-again-btn" class="btn btn-primary">再玩一次</button>
            <button id="menu-btn" class="btn btn-secondary">返回菜单</button>
        </div>
    </div>
    
    <script src="js/food.js"></script>
    <script src="js/snake.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
